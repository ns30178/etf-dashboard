name: Daily ETF Update

on:
  # 接收來自 cron-job.org 的外部 API 觸發信號 (對應 URL: /dispatches)
  repository_dispatch:
  # 保留 GitHub 網頁上的手動按鈕觸發通道
  workflow_dispatch:

# 允許 workflow 推回 commit
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - name: Date Guard (Check if 1st or 16th)
      id: date_guard
      run: |
        # 取得台灣時間目前的「日」
        DAY=$(TZ='Asia/Taipei' date +'%d')
        echo "台灣時間今日為: $DAY 號"
        
        # 判斷是否為 01 或 16
        if [ "$DAY" = "01" ] || [ "$DAY" = "16" ]; then
          echo "符合執行日期，放行。"
          echo "RUN_JOB=true" >> $GITHUB_ENV
        else
          echo "非 1 號或 16 號，攔截機制啟動，終止後續任務。"
          echo "RUN_JOB=false" >> $GITHUB_ENV
        fi

    - name: Checkout code
      if: env.RUN_JOB == 'true'
      uses: actions/checkout@v4

    - name: Set up Python
      if: env.RUN_JOB == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      if: env.RUN_JOB == 'true'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper Engine
      if: env.RUN_JOB == 'true'
      env:
        FINMIND_TOKEN:  ${{ secrets.FINMIND_TOKEN }}
        FUGLE_API_KEY:  ${{ secrets.FUGLE_API_KEY }}
        TG_BOT_TOKEN:   ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID:     ${{ secrets.TG_CHAT_ID }}
        IPO_SHEET_CSV:  ${{ secrets.IPO_SHEET_CSV }}
      run: python update_data.py

    - name: Commit and push changes
      if: env.RUN_JOB == 'true'
      run: |
        git config --global user.name  'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add -A
        git commit -m "Auto-update ETF data (premium/dividend/expense/sparkline)" || echo "No changes to commit"
        git push
