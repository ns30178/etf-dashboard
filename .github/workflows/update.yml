name: Daily ETF Update

on:
  # 已關閉 GitHub 內建容易延遲大塞車的排程，全權交由 cron-job.org 透過 API 精準觸發
  # schedule:
  #   - cron: '45 10 * * 1-5'
  
  # 保留外部 API 與手動強制觸發通道
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas beautifulsoup4

    - name: Run Scraper Engine
      env:
        FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: python update_data.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        git commit -m "Auto-update ETF data via API & Telegram Notified" || echo "No changes to commit"
        git push
