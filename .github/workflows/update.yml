name: Daily ETF Update

on:
  schedule:
    # 修改時間為 10:45 (UTC)，即台灣時間 18:45，避開尖峰塞車
    - cron: '45 10 * * 1-5'
  # 這是關鍵保險：讓你以後在手機上隨時可以點按鈕強制執行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas beautifulsoup4

    - name: Run Scraper Engine
      env:
        FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: python update_data.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        git commit -m "Auto-update ETF data via API & Telegram Notified" || echo "No changes to commit"
        git push
