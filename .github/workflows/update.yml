name: Daily ETF Update

on:
  # 台股收盤後更新（台北18:30 = UTC 07:30），週一~週五
  schedule:
    - cron: '30 10 * * 1-5'
  # 保留手動 / 外部 API（cron-job.org）觸發通道
  workflow_dispatch:

# 允許 workflow 推回 commit
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90        # 全市場 300+ 檔 + FinMind 節流，預留充足時間

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper Engine
      env:
        FINMIND_TOKEN:  ${{ secrets.FINMIND_TOKEN }}
        FUGLE_API_KEY:  ${{ secrets.FUGLE_API_KEY }}
        TG_BOT_TOKEN:   ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID:     ${{ secrets.TG_CHAT_ID }}
        IPO_SHEET_CSV:  ${{ secrets.IPO_SHEET_CSV }}
      run: python update_data.py

    - name: Commit and push changes
      run: |
        git config --global user.name  'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add -A
        git commit -m "Auto-update ETF data (premium/dividend/expense/sparkline)" || echo "No changes to commit"
        git push
