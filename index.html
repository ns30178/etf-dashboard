<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全市場 ETF 動態追蹤儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>.hide-scrollbar::-webkit-scrollbar { display: none; } .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }</style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    
    <div id="sys-error"></div>
    <script>
        window.onerror = function(msg, url, line) {
            document.getElementById('sys-error').innerHTML = '<div style="background:#fee2e2; color:#dc2626; padding:16px; margin:16px; border-radius:8px; font-weight:bold;">🔥 網頁發生錯誤: ' + msg + ' (行數: ' + line + ')<br/>請將此畫面截圖給開發者。</div>';
        };
    </script>

    <div id="root"></div>

    <script type="text/babel">
        try {
            const { useState, useEffect, useMemo, useRef } = React;
            const FILE_MAP = {
                "高股息": "data_high_div.json", "市值型": "data_market_cap.json",
                "主題型": "data_theme.json", "債券型": "data_bond.json",
                "綜合/其他": "data_other.json", "槓桿型": "data_leverage.json",
                "反向型": "data_inverse.json", "即將上市(IPO)": "data_ipo.json"
            };
            const CATEGORIES = Object.keys(FILE_MAP);
            
            // 3. 加入自選股分籤
            const TABS = ["⭐ 自選股", ...CATEGORIES];

            function ETFDashboard() {
                // 自選股緩存狀態 (防呆處理)
                const [favorites, setFavorites] = useState(() => {
                    try { return JSON.parse(localStorage.getItem('etf_favorites') || '[]'); } catch(e) { return []; }
                });

                const [activeTab, setActiveTab] = useState('高股息');
                const [currentData, setCurrentData] = useState([]);
                const [loading, setLoading] = useState(true);
                const [sortConfig, setSortConfig] = useState({ key: 'ytd', direction: 'desc' });
                const [expandedRow, setExpandedRow] = useState(null);
                
                // 2. 顯示最後更新時間
                const [lastUpdate, setLastUpdate] = useState("獲取中...");

                const [searchIndex, setSearchIndex] = useState([]);
                const [searchQuery, setSearchQuery] = useState("");
                const [showDropdown, setShowDropdown] = useState(false);
                const searchRef = useRef(null);

                // 自選股切換功能
                const toggleFavorite = (id) => {
                    const nextFav = favorites.includes(id) ? favorites.filter(x => x !== id) : [...favorites, id];
                    setFavorites(nextFav);
                    try { localStorage.setItem('etf_favorites', JSON.stringify(nextFav)); } catch(e) {}
                };

                const fmtVal = (val, prefix = "") => {
                    if (val === null || val === undefined || val === "" || Number.isNaN(val)) return "-";
                    return `${prefix}${Number(val).toFixed(2)}`;
                };
                const fmtPct = (val) => {
                    if (val === null || val === undefined || val === "" || Number.isNaN(val)) return "-";
                    return `${(Number(val) * 100).toFixed(2)}%`;
                };
                const fmtText = (val) => {
                    if (val === null || val === undefined || val === "") return "-";
                    return val;
                };
                
                // 8. 修正報酬率顏色：紅漲綠跌 (台灣習慣)
                const getReturnColor = (val) => {
                    if (val === null || val === undefined || val === "" || Number.isNaN(val)) return "text-slate-400";
                    return val > 0 ? "text-red-600 font-bold" : "text-green-600 font-bold";
                };

                useEffect(() => {
                    fetch('./search_index.json?t=' + new Date().getTime())
                        .then(res => res.ok ? res.json() : []).then(data => setSearchIndex(Array.isArray(data) ? data : [])).catch(() => setSearchIndex([]));
                    
                    fetch('./meta.json?t=' + new Date().getTime())
                        .then(res => res.ok ? res.json() : { last_update: "剛更新" }).then(data => setLastUpdate(data.last_update || "未知")).catch(() => setLastUpdate("剛更新"));

                    const handleClickOutside = (event) => {
                        if (searchRef.current && !searchRef.current.contains(event.target)) setShowDropdown(false);
                    };
                    document.addEventListener("mousedown", handleClickOutside);
                    return () => document.removeEventListener("mousedown", handleClickOutside);
                }, []);

                useEffect(() => {
                    setLoading(true);
                    let isMounted = true;
                    
                    if (activeTab === '⭐ 自選股') {
                        Promise.all(CATEGORIES.map(cat => fetch(`./${FILE_MAP[cat]}?t=` + new Date().getTime()).then(res => res.ok ? res.json() : []).catch(() => [])))
                        .then(results => {
                            if (!isMounted) return;
                            let merged = [];
                            results.forEach(arr => { if(Array.isArray(arr)) merged = merged.concat(arr); });
                            const filtered = merged.filter(item => item && item.id && favorites.includes(item.id));
                            
                            const unique = [];
                            const seen = new Set();
                            for (let item of filtered) {
                                if (!seen.has(item.id)) { seen.add(item.id); unique.push(item); }
                            }
                            setCurrentData(unique);
                            setLoading(false);
                        }).catch(() => { if(isMounted) { setCurrentData([]); setLoading(false); } });
                    } else {
                        fetch(`./${FILE_MAP[activeTab]}?t=` + new Date().getTime())
                            .then(res => res.ok ? res.json() : [])
                            .then(data => { if(isMounted) { setCurrentData(Array.isArray(data) ? data : []); setLoading(false); } })
                            .catch(() => { if(isMounted) { setCurrentData([]); setLoading(false); } });
                    }
                    return () => { isMounted = false; };
                }, [activeTab, favorites]);

                const sortedData = useMemo(() => {
                    let sortableItems = Array.isArray(currentData) ? [...currentData] : [];
                    if (activeTab === '即將上市(IPO)') return sortableItems;
                    sortableItems.sort((a, b) => {
                        let aValue = a ? a[sortConfig.key] : null;
                        let bValue = b ? b[sortConfig.key] : null;
                        if (aValue === null || aValue === undefined) return 1;
                        if (bValue === null || bValue === undefined) return -1;
                        if (aValue < bValue) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                    return sortableItems;
                }, [currentData, sortConfig, activeTab]);

                const requestSort = (key) => {
                    let direction = 'desc';
                    if (sortConfig.key === key && sortConfig.direction === 'desc') direction = 'asc';
                    setSortConfig({ key, direction });
                };

                const filteredSearch = searchIndex.filter(item => 
                    item && (
                        (item.id && item.id.includes(searchQuery)) || 
                        (item.name && item.name.includes(searchQuery))
                    )
                ).slice(0, 10);

                const handleSelectSearchResult = (item) => {
                    setActiveTab(item.category);
                    setExpandedRow(item.id);
                    setSearchQuery("");
                    setShowDropdown(false);
                };

                const isIPO = activeTab === '即將上市(IPO)';

                return (
                    <div className="p-2 md:p-6 max-w-[1600px] mx-auto w-full overflow-hidden">
                        <div className="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
                            <div className="relative w-full md:w-96 z-50" ref={searchRef}>
                                <input 
                                    type="text" 
                                    className="w-full border-2 border-slate-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 shadow-sm" 
                                    placeholder="🔍 搜尋 ETF 代號或名稱..."
                                    value={searchQuery}
                                    onChange={(e) => { setSearchQuery(e.target.value); setShowDropdown(true); }}
                                    onFocus={() => setShowDropdown(true)}
                                />
                                {searchQuery && (
                                    <button className="absolute right-3 top-2 text-slate-400 hover:text-slate-600 font-bold" onClick={() => { setSearchQuery(""); setShowDropdown(false); }}>✕</button>
                                )}
                                {showDropdown && searchQuery && (
                                    <div className="absolute top-11 left-0 w-full bg-white border shadow-lg rounded-lg max-h-60 overflow-y-auto z-50">
                                        {filteredSearch.length > 0 ? filteredSearch.map(item => (
                                            <div key={item.id} onClick={() => handleSelectSearchResult(item)} className="px-4 py-3 hover:bg-blue-50 cursor-pointer border-b last:border-0 flex justify-between items-center transition-colors">
                                                <span className="font-bold text-slate-800">{item.id} {item.name}</span>
                                                <span className="text-xs font-semibold bg-blue-100 text-blue-700 px-2 py-1 rounded">{item.category}</span>
                                            </div>
                                        )) : <div className="px-4 py-3 text-sm text-slate-500">查無相關 ETF 標的</div>}
                                    </div>
                                )}
                            </div>
                            <div className="text-sm font-semibold text-slate-500 bg-white px-3 py-2 rounded-lg border shadow-sm">
                                ⏱ 最後更新：{lastUpdate}
                            </div>
                        </div>

                        <div className="flex overflow-x-auto gap-2 mb-4 pb-2 border-b-2 border-slate-200 hide-scrollbar z-40 relative">
                            {TABS.map(cat => (
                                <button key={cat} onClick={() => { setActiveTab(cat); setExpandedRow(null); }} className={`whitespace-nowrap px-4 py-2 text-sm md:text-base font-bold rounded-t-lg transition-colors ${activeTab === cat ? 'bg-blue-600
