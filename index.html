<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全市場 ETF 動態追蹤儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* 隱藏卷軸但保持可滑動 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const CATEGORIES = ["高股息", "市值型", "主題型", "債券型", "綜合/其他", "槓桿型", "反向型"];

        function ETFDashboard() {
            const [activeTab, setActiveTab] = useState('高股息'); // 預設首頁為高股息
            const [data, setData] = useState({ ipo: [], main: [] });
            const [loading, setLoading] = useState(true);
            const [sortConfig, setSortConfig] = useState({ key: 'cagr_1y', direction: 'desc' });
            const [expandedRow, setExpandedRow] = useState(null);

            useEffect(() => {
                fetch('./market_data.json?t=' + new Date().getTime())
                    .then(res => res.json())
                    .then(jsonData => {
                        setData(jsonData);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setLoading(false);
                    });
            }, []);

            // 1. 先依據 Tab 進行資料過濾
            const filteredData = useMemo(() => {
                if (activeTab === 'IPO') return data.ipo;
                return data.main.filter(row => row.category === activeTab);
            }, [data.main, data.ipo, activeTab]);

            // 2. 對過濾後的資料進行排序
            const sortedData = useMemo(() => {
                let sortableItems = [...filteredData];
                sortableItems.sort((a, b) => {
                    let aValue = a[sortConfig.key];
                    let bValue = b[sortConfig.key];
                    if (aValue === null && bValue === null) return 0;
                    if (aValue === null) return 1; 
                    if (bValue === null) return -1; 
                    if (aValue < bValue) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });
                return sortableItems;
            }, [filteredData, sortConfig]);

            const requestSort = (key) => {
                let direction = 'desc';
                if (sortConfig.key === key && sortConfig.direction === 'desc') direction = 'asc';
                setSortConfig({ key, direction });
            };

            const formatPct = (val) => (val === null || val === undefined) ? "N/A" : `${(val * 100).toFixed(2)}%`;
            const formatNum = (val) => (val === null || val === undefined) ? "N/A" : val.toFixed(2);
            const getReturnColor = (val) => (val === null || val === undefined) ? "text-slate-400" : (val > 0 ? "text-green-600 font-bold" : "text-red-600 font-bold");

            const getPremiumStyle = (val) => {
                if (val === null || val === undefined) return "text-slate-400";
                if (val > 0.01) return "bg-red-500 text-white font-bold px-2 py-0.5 rounded"; 
                if (val < -0.01) return "text-green-600 font-bold";
                return "text-slate-700 font-semibold";
            };

            if (loading) return <div className="text-center p-10 text-xl font-bold text-blue-600">系統數據更新載入中，請稍候...</div>;

            return (
                <div className="p-2 md:p-6 max-w-[1600px] mx-auto w-full overflow-hidden">
                    
                    {/* 分頁標籤列 (可橫向滑動) */}
                    <div className="flex overflow-x-auto gap-2 mb-4 pb-2 border-b-2 border-slate-200 hide-scrollbar">
                        {CATEGORIES.map(cat => (
                            <button 
                                key={cat} 
                                onClick={() => { setActiveTab(cat); setExpandedRow(null); }}
                                className={`whitespace-nowrap px-4 py-2 text-sm md:text-base font-bold rounded-t-lg transition-colors
                                ${activeTab === cat ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}
                            >
                                {cat}
                            </button>
                        ))}
                        <button 
                            onClick={() => { setActiveTab('IPO'); setExpandedRow(null); }} 
                            className={`whitespace-nowrap px-4 py-2 text-sm md:text-base font-bold rounded-t-lg transition-colors
                            ${activeTab === 'IPO' ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}
                        >
                            即將上市 (IPO)
                        </button>
                    </div>

                    {activeTab === 'IPO' && (
                        <div className="bg-white rounded-lg shadow border border-slate-200 w-full overflow-x-auto">
                            <table className="w-full text-sm text-left whitespace-nowrap min-w-[600px]">
                                <thead className="bg-slate-100 text-slate-600">
                                    <tr>
                                        <th className="px-4 py-3">代號 / 中文名稱</th>
                                        <th className="px-4 py-3">掛牌日</th>
                                        <th className="px-4 py-3">發行價</th><th className="px-4 py-3">經管費</th>
                                        <th className="px-4 py-3">配息頻率</th><th className="px-4 py-3">前十大成分股</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {sortedData.map((ipo, idx) => (
                                        <tr key={idx} className="border-b hover:bg-slate-50">
                                            <td className="px-4 py-3 font-bold text-blue-700">{ipo.id} {ipo.name}</td>
                                            <td className="px-4 py-3">{ipo.issueDate}</td><td className="px-4 py-3">${ipo.price.toFixed(2)}</td>
                                            <td className="px-4 py-3">{ipo.fee}%</td><td className="px-4 py-3">{ipo.freq}</td>
                                            <td className="px-4 py-3 text-xs text-slate-500">{ipo.topHoldings}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {activeTab !== 'IPO' && (
                        <div className="bg-white rounded-lg shadow border border-slate-200 w-full relative">
                            <div className="p-2 bg-blue-50 text-blue-800 text-xs font-semibold border-b border-blue-100 flex justify-between">
                                <span>目前顯示：{activeTab} ({sortedData.length} 檔)</span>
                                <span>👆 點選表頭可自動排序</span>
                            </div>
                            <div className="overflow-x-auto max-h-[80vh] w-full relative">
                                <table className="w-full text-sm text-left whitespace-nowrap">
                                    <thead className="bg-slate-100 text-slate-600 font-semibold sticky top-0 z-20 shadow-sm">
                                        <tr>
                                            <th className="px-4 py-3 sticky left-0 bg-slate-100 z-30 border-r shadow-[1px_0_0_0_#e2e8f0] min-w-[200px]">代號 / 中文名稱</th>
                                            {[
                                                { key: 'price', label: '市價' },
                                                { key: 'premium', label: '折溢價' },
                                                { key: 'aum', label: '規模(億)' },
                                                { key: 'cagr_1y', label: '近1年報酬' },
                                                { key: 'sharpe', label: '夏普值' },
                                                { key: 'mdd', label: '最大回撤' },
                                                { key: 'vol_20d', label: '日均量(張)' }
                                            ].map(col => (
                                                <th key={col.key} className="px-4 py-3 cursor-pointer hover:bg-slate-200 select-none" onClick={() => requestSort(col.key)}>
                                                    <span className="flex items-center gap-1">
                                                        {col.label} <span className="text-blue-600 font-black">{sortConfig.key === col.key ? (sortConfig.direction === 'asc' ? '↑' : '↓') : ''}</span>
                                                    </span>
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {sortedData.map(row => (
                                            <React.Fragment key={row.id}>
                                                <tr className={`hover:bg-blue-50 cursor-pointer ${expandedRow === row.id ? 'bg-blue-50' : 'bg-white'}`} onClick={() => setExpandedRow(expandedRow === row.id ? null : row.id)}>
                                                    <td className="px-4 py-3 sticky left-0 z-10 border-r border-slate-100 bg-inherit shadow-[1px_0_0_0_#e2e8f0]">
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-blue-400 text-lg">{expandedRow === row.id ? '▼' : '▶'}</span>
                                                            <div>
                                                                <div className="font-bold text-slate-800 text-base">{row.id}</div>
                                                                <div className="text-xs text-blue-700 font-bold truncate max-w-[150px]">{row.name}</div>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="px-4 py-3 font-semibold">{formatNum(row.price)}</td>
                                                    <td className="px-4 py-3"><span className={getPremiumStyle(row.premium)}>{formatPct(row.premium)}</span></td>
                                                    <td className="px-4 py-3 text-slate-700 font-mono">{formatNum(row.aum)}</td>
                                                    <td className={`px-4 py-3 ${getReturnColor(row.cagr_1y)}`}>{formatPct(row.cagr_1y)}</td>
                                                    <td className="px-4 py-3">{formatNum(row.sharpe)}</td>
                                                    <td className="px-4 py-3 text-red-500">{formatPct(row.mdd)}</td>
                                                    <td className="px-4 py-3 font-mono text-slate-600">{row.vol_20d?.toLocaleString() || "N/A"}</td>
                                                </tr>
                                                
                                                {expandedRow === row.id && (
                                                    <tr className="bg-slate-50 border-b-2 border-blue-200">
                                                        <td colSpan="8" className="p-4 md:px-8">
                                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                                <div className="bg-white p-4 rounded-lg border shadow-sm">
                                                                    <h4 className="font-bold mb-3 text-blue-800">💰 殖利率與配息資訊</h4>
                                                                    <ul className="text-sm space-y-2">
                                                                        <li className="flex justify-between border-b border-slate-100 pb-1">
                                                                            <span className="text-slate-600">近 12 個月殖利率 (TTM)</span>
                                                                            <span className="font-bold text-purple-600 text-lg">{formatPct(row.yield_ttm)}</span>
                                                                        </li>
                                                                        <li className="flex justify-between border-b border-slate-100 pb-1">
                                                                            <span className="text-slate-600">近 12 個月配息總額</span>
                                                                            <span className="font-bold text-slate-800">${formatNum(row.dividend_rate)}</span>
                                                                        </li>
                                                                    </ul>
                                                                    <div className="mt-3 text-xs text-slate-400">※ 系統追蹤過去 12 個月實際發放金額精算而得。若該檔未配息或上市未滿一年，則為 N/A。</div>
                                                                </div>
                                                                <div className="bg-white p-4 rounded-lg border shadow-sm">
                                                                    <h4 className="font-bold mb-3 text-blue-800">📰 關聯新聞動態</h4>
                                                                    <ul className="text-sm space-y-2">
                                                                        {row.news && row.news.length > 0 ? row.news.map((n, i) => (
                                                                            <li key={i} className="border-b border-slate-50 pb-1">
                                                                                <a href={n.link} target="_blank" className="text-blue-600 hover:underline">{n.title}</a> 
                                                                                <span className="text-xs text-slate-400 ml-2">({n.date})</span>
                                                                            </li>
                                                                        )) : <li className="text-slate-500">近期尚無重大新聞或日均量較低</li>}
                                                                    </ul>
                                                                </div>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                )}
                                            </React.Fragment>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ETFDashboard />);
    </script>
</body>
</html>
