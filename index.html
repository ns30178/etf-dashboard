<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全市場 ETF 動態追蹤儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function ETFDashboard() {
            const [activeTab, setActiveTab] = useState('MAIN');
            const [data, setData] = useState({ ipo: [], main: [] });
            const [loading, setLoading] = useState(true);
            const [sortConfig, setSortConfig] = useState({ key: 'cagr_1y', direction: 'desc' });
            const [expandedRow, setExpandedRow] = useState(null);

            // 讀取後端自動生成的 JSON 資料
            useEffect(() => {
                fetch('./market_data.json?t=' + new Date().getTime())
                    .then(res => res.json())
                    .then(jsonData => {
                        setData(jsonData);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error("資料載入失敗", err);
                        setLoading(false);
                    });
            }, []);

            useEffect(() => {
                feather.replace();
            });

            // 排序運算邏輯 (強制 N/A 墊底)
            const sortedData = useMemo(() => {
                let sortableItems = [...data.main];
                sortableItems.sort((a, b) => {
                    let aValue = a[sortConfig.key];
                    let bValue = b[sortConfig.key];

                    if (aValue === null && bValue === null) return 0;
                    if (aValue === null) return 1; 
                    if (bValue === null) return -1; 

                    if (aValue < bValue) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });
                return sortableItems;
            }, [data.main, sortConfig]);

            const requestSort = (key) => {
                let direction = 'desc';
                if (sortConfig.key === key && sortConfig.direction === 'desc') {
                    direction = 'asc';
                }
                setSortConfig({ key, direction });
            };

            const formatPct = (val) => val === null ? "N/A" : `${(val * 100).toFixed(2)}%`;
            const formatNum = (val) => val === null ? "N/A" : val.toFixed(2);
            
            const getReturnColor = (val) => {
                if (val === null) return "text-slate-400";
                return val > 0 ? "text-green-600 font-bold" : "text-red-600 font-bold";
            };
            
            const getPremiumStyle = (val) => {
                if (val === null) return "text-slate-400";
                if (val > 0.01) return "bg-red-500 text-white font-bold px-2 py-0.5 rounded"; // 溢價大於1%警告
                if (val < -0.01) return "text-green-600 font-bold";
                return "text-slate-700";
            };

            if (loading) return <div className="text-center p-10 text-xl font-bold">資料載入中...</div>;

            return (
                <div className="p-2 md:p-6 max-w-[1600px] mx-auto">
                    <div className="mb-6 border-b-2 border-slate-200 flex gap-2">
                        <button onClick={() => setActiveTab('MAIN')} className={`px-4 py-2 font-bold rounded-t-lg ${activeTab === 'MAIN' ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-600'}`}>全市場已上市 ETF</button>
                        <button onClick={() => setActiveTab('IPO')} className={`px-4 py-2 font-bold rounded-t-lg ${activeTab === 'IPO' ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-600'}`}>即將上市區 (IPO)</button>
                    </div>

                    {activeTab === 'IPO' && (
                        <div className="bg-white rounded-lg shadow overflow-x-auto border border-slate-200">
                            <table className="w-full text-sm text-left whitespace-nowrap">
                                <thead className="bg-slate-100 text-slate-600">
                                    <tr>
                                        <th className="px-4 py-3">代號 / 名稱</th><th className="px-4 py-3">掛牌日</th>
                                        <th className="px-4 py-3">發行價</th><th className="px-4 py-3">經管費</th>
                                        <th className="px-4 py-3">配息頻率</th><th className="px-4 py-3">前十大成分股</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {data.ipo.map((ipo, idx) => (
                                        <React.Fragment key={idx}>
                                            <tr className="border-b hover:bg-slate-50 cursor-pointer" onClick={() => setExpandedRow(expandedRow === `ipo_${idx}` ? null : `ipo_${idx}`)}>
                                                <td className="px-4 py-3 font-bold text-blue-700">{ipo.id} {ipo.name}</td>
                                                <td className="px-4 py-3">{ipo.issueDate}</td><td className="px-4 py-3">${ipo.price.toFixed(2)}</td>
                                                <td className="px-4 py-3">{ipo.fee}%</td><td className="px-4 py-3">{ipo.freq}</td>
                                                <td className="px-4 py-3 text-xs text-slate-500 truncate max-w-xs">{ipo.topHoldings}</td>
                                            </tr>
                                            {expandedRow === `ipo_${idx}` && (
                                                <tr className="bg-slate-50 border-b-2 border-blue-200">
                                                    <td colSpan="6" className="p-4">
                                                        <div className="bg-white p-4 rounded border">
                                                            <h4 className="font-bold mb-2 flex items-center gap-2"><i data-feather="file-text" class="w-4 h-4 text-blue-600"></i> 新聞動態牆</h4>
                                                            <ul className="text-sm space-y-2">
                                                                {ipo.news && ipo.news.length > 0 ? ipo.news.map((n, i) => (
                                                                    <li key={i}><a href={n.link} target="_blank" className="text-blue-600 hover:underline">{n.title}</a> <span className="text-xs text-slate-400">({n.date})</span></li>
                                                                )) : <li className="text-slate-500">近期尚無相關新聞</li>}
                                                            </ul>
                                                        </div>
                                                    </td>
                                                </tr>
                                            )}
                                        </React.Fragment>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {activeTab === 'MAIN' && (
                        <div className="bg-white rounded-lg shadow overflow-hidden border border-slate-200">
                            <div className="overflow-x-auto max-h-[75vh]">
                                <table className="w-full text-sm text-left whitespace-nowrap relative">
                                    <thead className="bg-slate-100 text-slate-600 font-semibold sticky top-0 z-20 shadow-sm">
                                        <tr>
                                            <th className="px-4 py-3 sticky left-0 bg-slate-100 z-30 border-r min-w-[150px]">ETF 名稱</th>
                                            {[
                                                { key: 'price', label: '市價' },
                                                { key: 'cagr_1y', label: '近1年報酬' },
                                                { key: 'yield_ttm', label: 'TTM殖利率' },
                                                { key: 'premium', label: '折溢價' },
                                                { key: 'sharpe', label: '夏普值' },
                                                { key: 'mdd', label: '最大回撤' },
                                                { key: 'fee', label: '總費用率' },
                                                { key: 'aum', label: '規模(億)' },
                                                { key: 'vol_20d', label: '日均量(張)' }
                                            ].map(col => (
                                                <th key={col.key} className="px-4 py-3 cursor-pointer hover:bg-slate-200" onClick={() => requestSort(col.key)}>
                                                    {col.label} {sortConfig.key === col.key ? (sortConfig.direction === 'asc' ? '↑' : '↓') : ''}
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {sortedData.map(row => (
                                            <React.Fragment key={row.id}>
                                                <tr className={`hover:bg-blue-50 cursor-pointer ${expandedRow === row.id ? 'bg-blue-50' : 'bg-white'}`} onClick={() => setExpandedRow(expandedRow === row.id ? null : row.id)}>
                                                    <td className="px-4 py-3 sticky left-0 z-10 border-r border-slate-100 bg-inherit">
                                                        <div className="font-bold">{row.id} {row.name}</div>
                                                        <div className="text-[10px] bg-slate-200 text-slate-500 px-1 rounded inline-block mt-1">{row.type}</div>
                                                    </td>
                                                    <td className="px-4 py-3 font-semibold">{formatNum(row.price)}</td>
                                                    <td className={`px-4 py-3 ${getReturnColor(row.cagr_1y)}`}>{formatPct(row.cagr_1y)}</td>
                                                    <td className="px-4 py-3 font-semibold text-purple-600">{formatPct(row.yield_ttm)}</td>
                                                    <td className="px-4 py-3"><span className={getPremiumStyle(row.premium)}>{formatPct(row.premium)}</span></td>
                                                    <td className="px-4 py-3">{formatNum(row.sharpe)}</td>
                                                    <td className="px-4 py-3 text-red-500">{formatPct(row.mdd)}</td>
                                                    <td className="px-4 py-3">{formatNum(row.fee)}%</td>
                                                    <td className="px-4 py-3 font-mono">{row.aum}</td>
                                                    <td className="px-4 py-3 font-mono">{row.vol_20d?.toLocaleString()}</td>
                                                </tr>
                                                {expandedRow === row.id && (
                                                    <tr className="bg-slate-50 border-b-2 border-blue-200">
                                                        <td colSpan="10" className="p-4">
                                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                                <div className="bg-white p-4 rounded border">
                                                                    <h4 className="font-bold mb-2 flex items-center gap-2"><i data-feather="dollar-sign" class="w-4 h-4 text-blue-600"></i> 配息資訊</h4>
                                                                    {row.dividend ? (
                                                                        <ul className="text-sm space-y-1">
                                                                            <li className="flex justify-between border-b pb-1"><span>除息日</span> <b>{row.dividend.ex_date}</b></li>
                                                                            <li className="flex justify-between border-b pb-1"><span>發放日</span> <b>{row.dividend.pay_date}</b></li>
                                                                            <li className="flex justify-between border-b pb-1"><span>每單位金額</span> <b className="text-blue-600">${row.dividend.amount}</b></li>
                                                                        </ul>
                                                                    ) : <div className="text-sm text-slate-500">尚無配息紀錄</div>}
                                                                </div>
                                                                <div className="bg-white p-4 rounded border">
                                                                    <h4 className="font-bold mb-2 flex items-center gap-2"><i data-feather="file-text" class="w-4 h-4 text-blue-600"></i> 近期新聞</h4>
                                                                    <ul className="text-sm space-y-2">
                                                                        {row.news && row.news.length > 0 ? row.news.map((n, i) => (
                                                                            <li key={i}><a href={n.link} target="_blank" className="text-blue-600 hover:underline line-clamp-1">{n.title}</a> <span className="text-xs text-slate-400">{n.date}</span></li>
                                                                        )) : <li className="text-slate-500">近期尚無相關新聞</li>}
                                                                    </ul>
                                                                </div>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                )}
                                            </React.Fragment>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ETFDashboard />);
    </script>
</body>
</html>
