<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全市場 ETF 動態追蹤儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    <style>.hide-scrollbar::-webkit-scrollbar { display: none; } .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }</style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="sys-error" style="color: #dc2626; font-weight: bold; padding: 20px;"></div>
    <div id="root">
        <div id="fallback-ui" style="padding: 40px 20px; text-align: center; margin-top: 10vh;">
            <h2 style="font-size: 24px; color: #2563eb; font-weight: bold;">📊 載入中...</h2>
        </div>
    </div>

    <script type="text/babel">
        try {
            const { useState, useEffect, useMemo, useRef } = React;
            const FILE_MAP = {
                "高股息": "data_high_div.json", "市值型": "data_market_cap.json",
                "主題型": "data_theme.json", "債券型": "data_bond.json",
                "綜合/其他": "data_other.json", "槓桿型": "data_leverage.json",
                "反向型": "data_inverse.json", "即將上市(IPO)": "data_ipo.json"
            };
            const CATEGORIES = Object.keys(FILE_MAP);
            const TABS = ["⭐ 自選股", ...CATEGORIES];

            const loadFavorites = () => {
                try {
                    const saved = localStorage.getItem('etf_favorites');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        return Array.isArray(parsed) ? parsed : [];
                    }
                } catch (e) {}
                return [];
            };

            function ETFDashboard() {
                const [favorites, setFavorites] = useState(loadFavorites);
                const [activeTab, setActiveTab] = useState('高股息');
                const [currentData, setCurrentData] = useState([]);
                const [loading, setLoading] = useState(true);
                const [sortConfig, setSortConfig] = useState({ key: 'ytd', direction: 'desc' });
                const [expandedRow, setExpandedRow] = useState(null);
                const [lastUpdate, setLastUpdate] = useState("獲取中...");
                const [searchIndex, setSearchIndex] = useState([]);
                const [searchQuery, setSearchQuery] = useState("");
                const [showDropdown, setShowDropdown] = useState(false);
                const searchRef = useRef(null);

                const toggleFavorite = (id) => {
                    setFavorites(prev => {
                        const newFav = prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id];
                        try { localStorage.setItem('etf_favorites', JSON.stringify(newFav)); } catch (e) {}
                        return newFav;
                    });
                };

                const fmtVal = (val, prefix = "") => {
                    if (val === null || val === undefined || val === "" || Number.isNaN(val)) return "-";
                    return `${prefix}${Number(val).toFixed(2)}`;
                };
                const fmtPct = (val) => {
                    if (val === null || val === undefined || val === "" || Number.isNaN(val)) return "-";
                    return `${(Number(val) * 100).toFixed(2)}%`;
                };
                const fmtText = (val) => (val === null || val === undefined || val === "") ? "-" : val;
                const getReturnColor = (val) => (val === null || val === undefined || val === "" || Number.isNaN(val)) ? "text-slate-400" : (val > 0 ? "text-green-600 font-bold" : "text-red-600 font-bold");

                useEffect(() => {
                    fetch('./search_index.json?t=' + new Date().getTime())
                        .then(res => res.ok ? res.json() : []).then(data => setSearchIndex(Array.isArray(data) ? data : [])).catch(() => setSearchIndex([]));
                    fetch('./meta.json?t=' + new Date().getTime())
                        .then(res => res.ok ? res.json() : { last_update: "剛更新" }).then(data => setLastUpdate(data.last_update || "未知")).catch(() => setLastUpdate("剛更新"));
                    
                    const handleClickOutside = (event) => {
                        if (searchRef.current && !searchRef.current.contains(event.target)) setShowDropdown(false);
                    };
                    document.addEventListener("mousedown", handleClickOutside);
                    return () => document.removeEventListener("mousedown", handleClickOutside);
                }, []);

                useEffect(() => {
                    let isMounted = true;
                    setLoading(true);
                    if (activeTab === '⭐ 自選股') {
                        Promise.all(CATEGORIES.map(cat => fetch(`./${FILE_MAP[cat]}?t=` + new Date().getTime()).then(r => r.ok ? r.json() : []).catch(() => [])))
                        .then(results => {
                            if (!isMounted) return;
                            let merged = [];
                            results.forEach(arr => { if(Array.isArray(arr)) merged = merged.concat(arr); });
                            const filtered = merged.filter(item => item && item.id && favorites.includes(item.id));
                            const unique = Array.from(new Map(filtered.map(item => [item.id, item])).values());
                            setCurrentData(unique);
                            setLoading(false);
                        });
                    } else {
                        fetch(`./${FILE_MAP[activeTab]}?t=` + new Date().getTime())
                        .then(res => res.ok ? res.json() : []).then(data => { if(isMounted) { setCurrentData(Array.isArray(data) ? data : []); setLoading(false); } });
                    }
                    return () => { isMounted = false; };
                }, [activeTab, favorites]);

                const sortedData = useMemo(() => {
                    let sortableItems = Array.isArray(currentData) ? [...currentData] : [];
                    if (activeTab === '即將上市(IPO)') return sortableItems;
                    sortableItems.sort((a, b) => {
                        let aVal = a ? a[sortConfig.key] : null;
                        let bVal = b ? b[sortConfig.key] : null;
                        if (aVal === null || aVal === undefined) return 1;
                        if (bVal === null || bVal === undefined) return -1;
                        return sortConfig.direction === 'asc' ? (aVal < bVal ? -1 : 1) : (aVal > bVal ? -1 : 1);
                    });
                    return sortableItems;
                }, [currentData, sortConfig, activeTab]);

                return (
                    <div className="p-2 md:p-6 max-w-[1600px] mx-auto w-full">
                        <div className="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
                            <div className="relative w-full md:w-96 z-50" ref={searchRef}>
                                <input type="text" className="w-full border-2 border-slate-300 rounded-lg px-4 py-2 text-sm focus:border-blue-500 shadow-sm" placeholder="🔍 搜尋..." value={searchQuery} onChange={(e) => { setSearchQuery(e.target.value); setShowDropdown(true); }} />
                                {showDropdown && searchQuery && (
                                    <div className="absolute top-11 left-0 w-full bg-white border shadow-lg rounded-lg max-h-60 overflow-y-auto">
                                        {searchIndex.filter(item => item.id.includes(searchQuery) || item.name.includes(searchQuery)).slice(0, 10).map(item => (
                                            <div key={item.id} onClick={() => { setActiveTab(item.category); setExpandedRow(item.id); setShowDropdown(false); }} className="px-4 py-3 hover:bg-blue-50 cursor-pointer border-b">{item.id} {item.name}</div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <div className="text-sm font-semibold text-slate-500">⏱ 最後更新：{lastUpdate}</div>
                        </div>
                        <div className="flex overflow-x-auto gap-2 mb-4 border-b-2 border-slate-200">
                            {TABS.map(cat => <button key={cat} onClick={() => { setActiveTab(cat); setExpandedRow(null); }} className={`px-4 py-2 font-bold ${activeTab === cat ? 'bg-blue-600 text-white rounded-t-lg' : 'bg-slate-200'}`}>{cat}</button>)}
                        </div>
                        <div className="bg-white rounded-lg shadow border border-slate-200 overflow-x-auto">
                            {loading && <div className="p-4 text-center">資料載入中...</div>}
                            <table className="w-full text-sm text-left">
                                <thead className="bg-slate-100 text-slate-600 font-semibold sticky top-0">
                                    <tr>
                                        <th className="px-4 py-3 border-r">⭐</th>
                                        <th className="px-4 py-3 border-r">代號 / 名稱</th>
                                        {isIPO ? ["掛牌日", "發行價", "費用", "頻率"].map(h => <th key={h} className="px-4 py-3">{h}</th>) : 
                                        ["市價", "YTD", "近1年", "夏普", "回撤", "量"].map(h => <th key={h} className="px-4 py-3 cursor-pointer" onClick={() => requestSort(h)}>{h}</th>)}
                                    </tr>
                                </thead>
                                <tbody>
                                    {sortedData.map((row, i) => (
                                        <React.Fragment key={i}>
                                            <tr className="hover:bg-blue-50 cursor-pointer border-b" onClick={() => setExpandedRow(expandedRow === row.id ? null : row.id)}>
                                                <td className="px-4 py-3 border-r" onClick={(e) => { e.stopPropagation(); toggleFavorite(row.id); }}>{favorites.includes(row.id) ? '★' : '☆'}</td>
                                                <td className="px-4 py-3 border-r"><div className="font-bold">{row.id}</div><div className="text-xs text-blue-700">{row.name}</div></td>
                                                {isIPO ? (
                                                    <><td className="px-4 py-3">{row.issueDate}</td><td className="px-4 py-3">${row.price}</td><td className="px-4 py-3">{row.fee}%</td><td className="px-4 py-3">{row.freq}</td></>
                                                ) : (
                                                    <><td className="px-4 py-3">{fmtVal(row.price)}</td><td className={getReturnColor(row.ytd)}>{fmtPct(row.ytd)}</td><td className={getReturnColor(row.cagr_1y)}>{fmtPct(row.cagr_1y)}</td><td className="px-4 py-3">{
