<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全市場 ETF 動態追蹤儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>.hide-scrollbar::-webkit-scrollbar { display: none; } .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }</style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const FILE_MAP = {
            "高股息": "data_high_div.json", "市值型": "data_market_cap.json",
            "主題型": "data_theme.json", "債券型": "data_bond.json",
            "綜合/其他": "data_other.json", "槓桿型": "data_leverage.json",
            "反向型": "data_inverse.json", "即將上市(IPO)": "data_ipo.json"
        };
        const CATEGORIES = Object.keys(FILE_MAP);
        
        // 1. 加入自選股分籤
        const TABS = ["⭐ 自選股", ...CATEGORIES];

        function ETFDashboard() {
            // 2. 自選股緩存狀態
            const [favorites, setFavorites] = useState(() => {
                try { return JSON.parse(localStorage.getItem('etf_favorites') || '[]'); } catch(e) { return []; }
            });

            const [activeTab, setActiveTab] = useState('高股息');
            const [currentData, setCurrentData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [sortConfig, setSortConfig] = useState({ key: 'ytd', direction: 'desc' });
            const [expandedRow, setExpandedRow] = useState(null);
            
            // 3. 顯示最後更新時間
            const [lastUpdate, setLastUpdate] = useState("獲取中...");

            const [searchIndex, setSearchIndex] = useState([]);
            const [searchQuery, setSearchQuery] = useState("");
            const [showDropdown, setShowDropdown] = useState(false);
            const searchRef = useRef(null);

            // 4. 自選股切換功能
            const toggleFavorite = (id) => {
                const nextFav = favorites.includes(id) ? favorites.filter(x => x !== id) : [...favorites, id];
                setFavorites(nextFav);
                try { localStorage.setItem('etf_favorites', JSON.stringify(nextFav)); } catch(e) {}
            };

            const fmtVal = (val, prefix = "") => {
                if (val === null || val === undefined || val === "" || Number.isNaN(val)) return "-";
                return `${prefix}${Number(val).toFixed(2)}`;
            };
            const fmtPct = (val) => {
                if (val === null || val === undefined || val === "" || Number.isNaN(val)) return "-";
                return `${(Number(val) * 100).toFixed(2)}%`;
            };
            const fmtText = (val) => {
                if (val === null || val === undefined || val === "") return "-";
                return val;
            };
            
            // 5. 修正報酬率顏色：紅漲綠跌
            const getReturnColor = (val) => {
                if (val === null || val === undefined || val === "" || Number.isNaN(val)) return "text-slate-400";
                return val > 0 ? "text-red-600 font-bold" : "text-green-600 font-bold";
            };

            useEffect(() => {
                fetch('./search_index.json?t=' + new Date().getTime())
                    .then(res => res.json()).then(data => setSearchIndex(data)).catch(() => setSearchIndex([]));
                
                // 抓取最後更新時間
                fetch('./meta.json?t=' + new Date().getTime())
                    .then(res => res.json()).then(data => setLastUpdate(data.last_update)).catch(() => setLastUpdate("剛更新"));

                const handleClickOutside = (event) => {
                    if (searchRef.current && !searchRef.current.contains(event.target)) setShowDropdown(false);
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            useEffect(() => {
                setLoading(true);
                let isMounted = true;
                
                // 6. 整合自選股抓取邏輯
                if (activeTab === '⭐ 自選股') {
                    Promise.all(CATEGORIES.map(cat => fetch(`./${FILE_MAP[cat]}?t=` + new Date().getTime()).then(res => res.ok ? res.json() : []).catch(() => [])))
                    .then(results => {
                        if (!isMounted) return;
                        let merged = [];
                        results.forEach(arr => { if(Array.isArray(arr)) merged = merged.concat(arr); });
                        const filtered = merged.filter(item => item && favorites.includes(item.id));
                        
                        const unique = [];
                        const seen = new Set();
                        for (let item of filtered) {
                            if (!seen.has(item.id)) { seen.add(item.id); unique.push(item); }
                        }
                        setCurrentData(unique);
                        setLoading(false);
                    }).catch(() => { if(isMounted) { setCurrentData([]); setLoading(false); } });
                } else {
                    fetch(`./${FILE_MAP[activeTab]}?t=` + new Date().getTime())
                        .then(res => res.json())
                        .then(data => { if(isMounted) { setCurrentData(Array.isArray(data) ? data : []); setLoading(false); } })
                        .catch(() => { if(isMounted) { setCurrentData([]); setLoading(false); } });
                }
                return () => { isMounted = false; };
            }, [activeTab, favorites]);

            const sortedData = useMemo(() => {
                let sortableItems = [...currentData];
                if (activeTab === '即將上市(IPO)') return sortableItems;
                sortableItems.sort((a, b) => {
                    let aValue = a[sortConfig.key];
                    let bValue = b[sortConfig.key];
                    if (aValue === null || aValue === undefined) return 1;
                    if (bValue === null || bValue === undefined) return -1;
                    if (aValue < bValue) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });
                return sortableItems;
            }, [currentData, sortConfig, activeTab]);

            const requestSort = (key) => {
                let direction = 'desc';
                if (sortConfig.key === key && sortConfig.direction === 'desc') direction = 'asc';
                setSortConfig({ key, direction });
            };

            const filteredSearch = searchIndex.filter(item => 
                item.id.includes(searchQuery) || item.name.includes(searchQuery)
            ).slice(0, 10);

            const handleSelectSearchResult = (item) => {
                setActiveTab(item.category);
                setExpandedRow(item.id);
                setSearchQuery("");
                setShowDropdown(false);
            };

            const isIPO = activeTab === '即將上市(IPO)';

            return (
                <div className="p-2 md:p-6 max-w-[1600px] mx-auto w-full overflow-hidden">
                    <div className="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
                        <div className="relative w-full md:w-96 z-50" ref={searchRef}>
                            <input 
                                type="text" 
                                className="w-full border-2 border-slate-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 shadow-sm" 
                                placeholder="🔍 搜尋 ETF 代號或名稱..."
                                value={searchQuery}
                                onChange={(e) => { setSearchQuery(e.target.value); setShowDropdown(true); }}
                                onFocus={() => setShowDropdown(true)}
                            />
                            {searchQuery && (
                                <button className="absolute right-3 top-2 text-slate-400 hover:text-slate-600 font-bold" onClick={() => { setSearchQuery(""); setShowDropdown(false); }}>✕</button>
                            )}
                            {showDropdown && searchQuery && (
                                <div className="absolute top-11 left-0 w-full bg-white border shadow-lg rounded-lg max-h-60 overflow-y-auto z-50">
                                    {filteredSearch.length > 0 ? filteredSearch.map(item => (
                                        <div key={item.id} onClick={() => handleSelectSearchResult(item)} className="px-4 py-3 hover:bg-blue-50 cursor-pointer border-b last:border-0 flex justify-between items-center transition-colors">
                                            <span className="font-bold text-slate-800">{item.id} {item.name}</span>
                                            <span className="text-xs font-semibold bg-blue-100 text-blue-700 px-2 py-1 rounded">{item.category}</span>
                                        </div>
                                    )) : <div className="px-4 py-3 text-sm text-slate-500">查無相關 ETF 標的</div>}
                                </div>
                            )}
                        </div>
                        <div className="text-sm font-semibold text-slate-500 bg-white px-3 py-2 rounded-lg border shadow-sm">
                            ⏱ 最後更新：{lastUpdate}
                        </div>
                    </div>

                    <div className="flex overflow-x-auto gap-2 mb-4 pb-2 border-b-2 border-slate-200 hide-scrollbar z-40 relative">
                        {TABS.map(cat => (
                            <button key={cat} onClick={() => { setActiveTab(cat); setExpandedRow(null); }} className={`whitespace-nowrap px-4 py-2 text-sm md:text-base font-bold rounded-t-lg transition-colors ${activeTab === cat ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}>
                                {cat}
                            </button>
                        ))}
                    </div>

                    <div className="bg-white rounded-lg shadow border border-slate-200 w-full relative z-30">
                        {loading && <div className="absolute inset-0 bg-white/80 z-50 flex items-center justify-center font-bold text-blue-600">資料載入中...</div>}
                        <div className="p-2 bg-blue-50 text-blue-800 text-xs font-semibold border-b border-blue-100 flex justify-between">
                            <span>當前板塊：{activeTab} ({sortedData.length} 檔)</span>
                            {!isIPO && <span>👆 點選欄位標頭可即時排序</span>}
                        </div>
                        <div className="overflow-x-auto max-h-[80vh] w-full relative">
                            <table className="w-full text-sm text-left whitespace-nowrap">
                                <thead className="bg-slate-100 text-slate-600 font-semibold sticky top-0 z-20 shadow-sm">
                                    <tr>
                                        <th className="px-2 py-3 sticky left-0 bg-slate-100 z-30 border-r w-10 text-center">⭐</th>
                                        <th className="px-4 py-3 sticky left-10 bg-slate-100 z-30 border-r min-w-[200px]">代號 / 中文名稱</th>
                                        {isIPO ? [
                                            { key: 'issueDate', label: '掛牌日' }, { key: 'price', label: '發行價' },
                                            { key: 'fee', label: '經管費' }, { key: 'freq', label: '配息頻率' },
                                            { key: 'topHoldings', label: '前十大成分股' }
                                        ].map(col => <th key={col.key} className="px-4 py-3">{col.label}</th>) : 
                                        [
                                            { key: 'price', label: '市價' }, 
                                            { key: 'ytd', label: '今年以來(YTD)' },
                                            { key: 'cagr_1y', label: '近1年報酬' },
                                            { key: 'sharpe', label: '夏普值' }, 
                                            { key: 'mdd', label: '最大回撤' },
                                            { key: 'vol_20d', label: '日均量(張)' }
                                        ].map(col => (
                                            <th key={col.key} className="px-4 py-3 cursor-pointer hover:bg-slate-200 select-none" onClick={() => requestSort(col.key)}>
                                                <span className="flex items-center gap-1">{col.label} <span className="text-blue-600 font-black">{sortConfig.key === col.key ? (sortConfig.direction === 'asc' ? '↑' : '↓') : ''}</span></span>
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {sortedData.map((row, idx) => {
                                        const isFav = favorites.includes(row.id);
                                        return (
                                        <React.Fragment key={row.id || idx}>
                                            <tr className={`hover:bg-blue-50 cursor-pointer ${expandedRow === row.id ? 'bg-blue-50' : 'bg-white'}`} onClick={() => setExpandedRow(expandedRow === row.id ? null : row.id)}>
                                                <td className="px-2 py-3 sticky left-0 z-10 border-r border-slate-100 bg-inherit text-center text-lg" onClick={(e) => { e.stopPropagation(); toggleFavorite(row.id); }}>
                                                    <span className={isFav ? "text-yellow-400 drop-shadow-sm" : "text-slate-300 hover:text-yellow-300"}>{isFav ? '★' : '☆'}</span>
                                                </td>
                                                <td className="px-4 py-3 sticky left-10 z-10 border-r border-slate-100 bg-inherit">
                                                    <div className="flex items-center justify-between">
                                                        <div><div className="font-bold text-slate-800 text-base">{row.id}</div><div className="text-xs text-blue-700 font-bold truncate max-w-[150px]">{row.name}</div></div>
                                                        {row.freq && row.freq !== "-" && !isIPO && (
                                                            <span className="ml-2 px-1.5 py-0.5 text-[10px] rounded bg-purple-100 text-purple-800 border border-purple-200 font-bold whitespace-nowrap">{row.freq}</span>
                                                        )}
                                                    </div>
                                                </td>
                                                {isIPO ? (
                                                    <React.Fragment>
                                                        <td className="px-4 py-3">{fmtText(row.issueDate)}</td>
                                                        <td className="px-4 py-3">{fmtVal(row.price, "$")}</td>
                                                        <td className="px-4 py-3">{fmtVal(row.fee, "")}%</td>
                                                        <td className="px-4 py-3">{fmtText(row.freq)}</td>
                                                        <td className="px-4 py-3 text-xs text-slate-500 whitespace-normal min-w-[200px]">{fmtText(row.topHoldings)}</td>
                                                    </React.Fragment>
                                                ) : (
                                                    <React.Fragment>
                                                        <td className="px-4 py-3 font-semibold">{fmtVal(row.price)}</td>
                                                        <td className={`px-4 py-3 ${getReturnColor(row.ytd)}`}>{fmtPct(row.ytd)}</td>
                                                        <td className={`px-4 py-3 ${getReturnColor(row.cagr_1y)}`}>{fmtPct(row.cagr_1y)}</td>
                                                        <td className="px-4 py-3">{fmtVal(row.sharpe)}</td>
                                                        <td className="px-4 py-3 text-green-600 font-bold">{fmtPct(row.mdd)}</td>
                                                        <td className="px-4 py-3 font-mono text-slate-600">{fmtVal(row.vol_20d)}</td>
                                                    </React.Fragment>
                                                )}
                                            </tr>
                                            {expandedRow === row.id && (
                                                <tr className="bg-slate-50 border-b-2 border-blue-200">
                                                    <td colSpan={isIPO ? "7" : "8"} className="p-4 md:px-8">
                                                        {/* 7. 雙欄式排版與外部連結修正 */}
                                                        <div className={`grid grid-cols-1 ${!isIPO ? 'md:grid-cols-2' : ''} gap-4`}>
                                                            {!isIPO && (
                                                                <React.Fragment>
                                                                    <div className="bg-white p-4 rounded-lg border shadow-sm">
                                                                        <h4 className="font-bold mb-3 text-blue-800">💰 實質殖利率與配息 (TTM)</h4>
                                                                        <ul className="text-sm space-y-3">
                                                                            <li className="flex justify-between border-b pb-1"><span className="text-slate-600">實質 TTM 殖利率</span><span className="font-bold text-purple-600 text-lg">{fmtPct(row.yield_ttm)}</span></li>
                                                                            <li className="flex justify-between border-b pb-1"><span className="text-slate-600">近一年累計發放</span><span className="font-bold text-slate-800">{fmtVal(row.dividend_rate, "$")}</span></li>
                                                                        </ul>
                                                                    </div>
                                                                    <div className="bg-white p-4 rounded-lg border shadow-sm">
                                                                        <h4 className="font-bold mb-3 text-blue-800">🔗 深度資訊與新聞快捷連結</h4>
                                                                        <div className="grid grid-cols-2 gap-2 mt-2">
                                                                            <a href={`https://www.wantgoo.com/stock/etf/${row.id}/discount-premium`} target="_blank" className="bg-slate-100 text-slate-700 hover:bg-slate-200 px-2 py-3 rounded text-sm font-bold transition text-center shadow-sm">⚖️ 即時折溢價與淨值</a>
                                                                            <a href={`https://www.wantgoo.com/stock/etf/${row.id}/profile`} target="_blank" className="bg-slate-100 text-slate-700 hover:bg-slate-200 px-2 py-3 rounded text-sm font-bold transition text-center shadow-sm">📝 規模、基本資料與配息</a>
                                                                            <a href={`https://www
