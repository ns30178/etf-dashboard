<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const FILE_MAP = {
            "高股息": "data_high_div.json", "市值型": "data_market_cap.json",
            "主題型": "data_theme.json", "債券型": "data_bond.json",
            "綜合/其他": "data_other.json", "槓桿型": "data_leverage.json",
            "反向型": "data_inverse.json", "即將上市(IPO)": "data_ipo.json"
        };
        const TABS = ["⭐ 自選股", ...Object.keys(FILE_MAP)];

        function ETFDashboard() {
            const [favorites, setFavorites] = useState(() => {
                try { return JSON.parse(localStorage.getItem('etf_favorites') || '[]'); } catch(e) { return []; }
            });
            const [activeTab, setActiveTab] = useState('高股息');
            const [currentData, setCurrentData] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                setLoading(true);
                const fetchData = async () => {
                    try {
                        if (activeTab === '⭐ 自選股') {
                            let allItems = [];
                            for (const cat of Object.keys(FILE_MAP)) {
                                const res = await fetch(`./${FILE_MAP[cat]}?t=${Date.now()}`);
                                if (res.ok) {
                                    const data = await res.json();
                                    if (Array.isArray(data)) allItems = allItems.concat(data);
                                }
                            }
                            const filtered = allItems.filter(item => item && favorites.includes(item.id));
                            setCurrentData(filtered);
                        } else {
                            const res = await fetch(`./${FILE_MAP[activeTab]}?t=${Date.now()}`);
                            if (res.ok) {
                                const data = await res.json();
                                setCurrentData(Array.isArray(data) ? data : []);
                            } else {
                                setCurrentData([]);
                            }
                        }
                    } catch (err) {
                        console.error("載入失敗", err);
                        setCurrentData([]);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchData();
            }, [activeTab, favorites]);

            const toggleFav = (id) => {
                const next = favorites.includes(id) ? favorites.filter(x => x !== id) : [...favorites, id];
                setFavorites(next);
                try { localStorage.setItem('etf_favorites', JSON.stringify(next)); } catch(e) {}
            };

            return (
                <div className="p-2">
                    <div className="flex gap-2 overflow-x-auto pb-2 mb-4 border-b">
                        {TABS.map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`px-3 py-1 text-sm font-bold rounded ${activeTab === tab ? 'bg-blue-600 text-white' : 'bg-slate-200'}`}>
                                {tab}
                            </button>
                        ))}
                    </div>
                    {loading ? <div className="text-center py-10 font-bold">資料載入中...</div> : (
                        <table className="w-full text-xs text-left">
                            <thead className="bg-slate-200">
                                <tr>
                                    <th className="p-2">⭐</th>
                                    <th className="p-2">代號</th>
                                    <th className="p-2">市價</th>
                                    <th className="p-2">YTD</th>
                                </tr>
                            </thead>
                            <tbody>
                                {currentData.map(row => (
                                    <tr key={row.id} className="border-b">
                                        <td className="p-2" onClick={() => toggleFav(row.id)}>{favorites.includes(row.id) ? '★' : '☆'}</td>
                                        <td className="p-2 font-bold">{row.id}<br/><span className="text-[10px] text-slate-500">{row.name}</span></td>
                                        <td className="p-2">{row.price || '-'}</td>
                                        <td className={`p-2 ${row.ytd > 0 ? 'text-green-600' : 'text-red-600'}`}>{(row.ytd*100).toFixed(2)}%</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ETFDashboard />);
    </script>
</body>
</html>
