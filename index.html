<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全市場 ETF 動態追蹤儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; } 
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .highlight-row { animation: highlight-fade 2s ease-out; }
        @keyframes highlight-fade {
            0% { background-color: #dbeafe; }
            100% { background-color: transparent; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    
    <div id="sys-error"></div>
    <script>
        window.onerror = function(msg, url, line, col, error) {
            var errBox = document.getElementById('sys-error');
            var realError = error ? error.stack : msg;
            errBox.innerHTML = '<div style="background:#fee2e2; color:#dc2626; padding:16px; margin:16px; border-radius:8px; font-weight:bold;">' +
                '⚠️ 系統載入失敗<br><br>' +
                '錯誤原因: ' + realError + '<br>行數: ' + line + '<br><br>' +
                '<button onclick="window.location.reload(true)" style="margin-top:10px; padding:8px 16px; background:#dc2626; color:white; border-radius:4px; border:none; font-weight:bold; cursor:pointer;">🔄 點我強制清除快取並重新整理</button>' +
                '</div>';
            var fallbackUI = document.getElementById('fallback-ui');
            if (fallbackUI) fallbackUI.style.display = 'none';
        };
    </script>

    <div id="root">
        <div id="fallback-ui" style="text-align: center; padding: 50px; font-weight: bold; color: #2563eb;">
            ⏳ 正在連接伺服器與啟動儀表板引擎...<br>
            <span style="font-size: 14px; color: #64748b; margin-top: 10px; display: inline-block;">若持續卡在此畫面，代表您的瀏覽器快取未更新，請重新整理</span>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const FILE_MAP = {
            "高股息": "data_high_div.json", "市值型": "data_market_cap.json",
            "主題型": "data_theme.json", "債券型": "data_bond.json",
            "綜合/其他": "data_other.json", "槓桿型": "data_leverage.json",
            "反向型": "data_inverse.json", "即將上市(IPO)": "data_ipo.json"
        };
        const CATEGORIES = Object.keys(FILE_MAP);
        const TABS = ["⭐ 自選股", ...CATEGORIES];

        function getSavedFavs() {
            try {
                if (typeof window !== 'undefined' && window.localStorage) {
                    const saved = window.localStorage.getItem('etf_favorites');
                    if (saved) return JSON.parse(saved);
                }
            } catch(e) {}
            return [];
        }

        function saveFavs(favs) {
            try {
                if (typeof window !== 'undefined' && window.localStorage) {
                    window.localStorage.setItem('etf_favorites', JSON.stringify(favs));
                }
            } catch(e) {}
        }

        function ETFDashboard() {
            const [favorites, setFavorites] = useState(getSavedFavs());
            const [activeTab, setActiveTab] = useState('高股息');
            const [currentData, setCurrentData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [sortConfig, setSortConfig] = useState({ key: 'ytd', direction: 'desc' });
            const [expandedRow, setExpandedRow] = useState(null);
            const [lastUpdate, setLastUpdate] = useState("獲取中...");
            const [pendingScrollId, setPendingScrollId] = useState(null);

            const [searchIndex, setSearchIndex] = useState([]);
            const [searchQuery, setSearchQuery] = useState("");
            const [showDropdown, setShowDropdown] = useState(false);
            const searchRef = useRef(null);

            const toggleFavorite = (id) => {
                setFavorites(prev => {
                    const nextFav = prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id];
                    saveFavs(nextFav);
                    return nextFav;
                });
            };

            const fmtVal = (val, prefix = "") => {
                if (val === null || val === undefined || val === "" || Number.isNaN(val)) return "-";
                return `${prefix}${Number(val).toFixed(2)}`;
            };
            
            const fmtPct = (val) => {
                if (val === null || val === undefined || val === "" || Number.isNaN(val)) return "-";
                return `${(Number(val) * 100).toFixed(2)}%`;
            };
            
            const fmtText = (val) => {
                if (val === null || val === undefined || val === "") return "-";
                return val;
            };
            
            const getReturnColor = (val) => {
                if (val === null || val === undefined || val === "" || Number.isNaN(val)) return "text-slate-400";
                return Number(val) > 0 ? "text-red-600 font-bold" : (Number(val) < 0 ? "text-green-600 font-bold" : "text-slate-600 font-bold");
            };

            useEffect(() => {
                fetch('./search_index.json?t=' + Date.now())
                    .then(res => res.ok ? res.json() : [])
                    .then(data => setSearchIndex(Array.isArray(data) ? data : []))
                    .catch(() => {});
                
                fetch('./meta.json?t=' + Date.now())
                    .then(res => res.ok ? res.json() : { last_update: "等待更新" })
                    .then(data => setLastUpdate(data.last_update || "等待更新"))
                    .catch(() => setLastUpdate("等待更新"));

                const handleClickOutside = (event) => {
                    if (searchRef.current && !searchRef.current.contains(event.target)) setShowDropdown(false);
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            useEffect(() => {
                setLoading(true);
                let isMounted = true;
                
                if (activeTab === '⭐ 自選股') {
                    Promise.all(CATEGORIES.map(cat => 
                        fetch(`./${FILE_MAP[cat]}?t=${Date.now()}`)
                        .then(res => res.ok ? res.json() : [])
                        .catch(() => [])
                    ))
                    .then(results => {
                        if (!isMounted) return;
                        let merged = [];
                        results.forEach(arr => {
                            if (Array.isArray(arr)) merged = merged.concat(arr);
                        });
                        
                        const unique = [];
                        const seen = new Set();
                        merged.forEach(item => {
                            if (item && item.id && favorites.includes(item.id) && !seen.has(item.id)) {
                                seen.add(item.id);
                                unique.push(item);
                            }
                        });
                        setCurrentData(unique);
                        setLoading(false);
                    })
                    .catch(() => { if (isMounted) { setCurrentData([]); setLoading(false); } });
                } else {
                    fetch(`./${FILE_MAP[activeTab]}?t=${Date.now()}`)
                        .then(res => res.ok ? res.json() : [])
                        .then(data => {
                            if (isMounted) { setCurrentData(Array.isArray(data) ? data : []); setLoading(false); }
                        })
                        .catch(() => {
                            if (isMounted) { setCurrentData([]); setLoading(false); }
                        });
                }
                return () => { isMounted = false; };
            }, [activeTab, favorites]);

            useEffect(() => {
                if (pendingScrollId && !loading && currentData.length > 0) {
                    setTimeout(() => {
                        const targetRow = document.getElementById(`row-${pendingScrollId}`);
                        if (targetRow) {
                            targetRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            targetRow.classList.add('highlight-row');
                            setTimeout(() => {
                                targetRow.classList.remove('highlight-row');
                            }, 2000);
                            setPendingScrollId(null);
                        }
                    }, 150);
                }
            }, [currentData, loading, pendingScrollId]);

            const sortedData = useMemo(() => {
                let sortableItems = Array.isArray(currentData) ? [...currentData] : [];
                if (activeTab === '即將上市(IPO)') return sortableItems;

                sortableItems.sort((a, b) => {
                    let aValue = a ? a[sortConfig.key] : null;
                    let bValue = b ? b[sortConfig.key] : null;
                    if (aValue === null || aValue === undefined) return 1;
                    if (bValue === null || bValue === undefined) return -1;
                    if (aValue < bValue) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });
                return sortableItems;
            }, [currentData, sortConfig, activeTab]);

            const requestSort = (key) => {
                let direction = 'desc';
                if (sortConfig.key === key && sortConfig.direction === 'desc') direction = 'asc';
                setSortConfig({ key, direction });
            };

            const filteredSearch = searchIndex.filter(item => {
                if (!item) return false;
                const idStr = String(item.id || "");
                const nameStr = String(item.name || "");
                return idStr.includes(searchQuery) || nameStr.includes(searchQuery);
            }).slice(0, 10);

            const handleSelectSearchResult = (item) => {
                setActiveTab(item.category);
                setExpandedRow(item.id);
                setSearchQuery("");
                setShowDropdown(false);
                setPendingScrollId(item.id);
            };

            const isIPO = activeTab === '即將上市(IPO)';

            return (
                <div className="p-2 md:p-6 max-w-[1600px] mx-auto w-full overflow-hidden">
                    <div className="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
                        <div className="relative w-full md:w-96 z-50" ref={searchRef}>
                            <input 
                                type="text" 
                                className="w-full border-2 border-slate-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 shadow-sm" 
                                placeholder="🔍 搜尋 ETF 代號或名稱..."
                                value={searchQuery}
                                onChange={(e) => { setSearchQuery(e.target.value); setShowDropdown(true); }}
                                onFocus={() => setShowDropdown(true)}
                            />
                            {searchQuery && (
                                <button className="absolute right-3 top-2 text-slate-400 hover:text-slate-600 font-bold" onClick={() => { setSearchQuery(""); setShowDropdown(false); }}>✕</button>
                            )}
                            {showDropdown && searchQuery && (
                                <div className="absolute top-11 left-0 w-full bg-white border shadow-lg rounded-lg max-h-60 overflow-y-auto z-50">
                                    {filteredSearch.length > 0 ? filteredSearch.map(item => (
                                        <div 
                                            key={item.id} 
                                            onClick={() => handleSelectSearchResult(item)} 
                                            className="px-4 py-3 hover:bg-blue-50 cursor-pointer border-b last:border-0 flex justify-between items-center transition-colors"
                                        >
                                            <span className="font-bold text-slate-800">{item.id} {item.name}</span>
                                            <span className="text-xs font-semibold bg-blue-100 text-blue-700 px-2 py-1 rounded">{item.category}</span>
                                        </div>
                                    )) : <div className="px-4 py-3 text-sm text-slate-500">查無相關 ETF 標的</div>}
                                </div>
                            )}
                        </div>
                        <div className="text-sm font-semibold text-slate-500 bg-white px-3 py-2 rounded-lg border shadow-sm">
                            ⏱ 最後更新：{lastUpdate}
                        </div>
                    </div>

                    <div className="flex overflow-x-auto gap-2 mb-4 pb-2 border-b-2 border-slate-200 hide-scrollbar z-40 relative">
                        {TABS.map(cat => (
                            <button 
                                key={cat} 
                                onClick={() => { setActiveTab(cat); setExpandedRow(null); }} 
                                className={`whitespace-nowrap px-4 py-2 text-sm md:text-base font-bold rounded-t-lg transition-colors ${activeTab === cat ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>

                    <div className="bg-white rounded-lg shadow border border-slate-200 w-full relative z-30">
                        {loading && (
                            <div className="absolute inset-0 bg-white/80 z-50 flex items-center justify-center font-bold text-blue-600">
                                資料載入中...
                            </div>
                        )}
                        <div className="p-2 bg-blue-50 text-blue-800 text-xs font-semibold border-b border-blue-100 flex justify-between">
                            <span>當前板塊：{activeTab} ({sortedData.length} 檔)</span>
                            {!isIPO && <span>👆 點選欄位標頭可即時排序</span>}
                        </div>
                        <div className="overflow-x-auto max-h-[80vh] w-full relative">
                            <table className="w-full text-sm text-left whitespace-nowrap">
                                <thead className="bg-slate-100 text-slate-600 font-semibold sticky top-0 z-20 shadow-sm">
                                    <tr>
                                        <th className="px-2 py-3 sticky left-0 bg-slate-100 z-30 border-r w-10 text-center">⭐</th>
                                        <th className="px-4 py-3 sticky left-10 bg-slate-100 z-30 border-r min-w-[200px]">代號 / 中文名稱</th>
                                        {isIPO ? [
                                            { key: 'type', label: '基金型態' }, 
                                            { key: 'manager', label: '經理人' },
                                            { key: 'period', label: '募集期間' }, 
                                            { key: 'info', label: '申購指南' }
                                        ].map(col => <th key={col.key} className="px-4 py-3 font-bold">{col.label}</th>) : 
                                        [
                                            { key: 'price', label: '市價' }, 
                                            { key: 'ytd', label: '今年以來(YTD)' },
                                            { key: 'cagr_1y', label: '近1年報酬' },
                                            { key: 'sharpe', label: '夏普值' }, 
                                            { key: 'mdd', label: '最大回撤' },
                                            { key: 'vol_20d', label: '日均量(張)' }
                                        ].map(col => (
                                            <th key={col.key} className="px-4 py-3 cursor-pointer hover:bg-slate-200 select-none" onClick={() => requestSort(col.key)}>
                                                <span className="flex items-center gap-1">
                                                    {col.label} 
                                                    <span className="text-blue-600 font-black">
                                                        {sortConfig.key === col.key ? (sortConfig.direction === 'asc' ? '↑' : '↓') : ''}
                                                    </span>
                                                </span>
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {sortedData.map((row, idx) => {
                                        if (!row) return null;
                                        const isFav = !isIPO && favorites.includes(row.id);
                                        const rowKey = isIPO ? `ipo-${idx}` : row.id;
                                        const isExpanded = expandedRow === rowKey;
                                        const isSystemPrompt = row.id === "⚠️ 系統提示";

                                        return (
                                        <React.Fragment key={rowKey}>
                                            <tr 
                                                id={`row-${rowKey}`}
                                                className={`hover:bg-blue-50 cursor-pointer transition-colors duration-500 ${isExpanded ? 'bg-blue-50' : 'bg-white'}`} 
                                                onClick={() => setExpandedRow(isExpanded ? null : rowKey)}
                                            >
                                                <td 
                                                    className="px-2 py-3 sticky left-0 z-10 border-r border-slate-100 bg-inherit text-center text-lg select-none" 
                                                    onClick={(e) => { 
                                                        e.stopPropagation(); 
                                                        if(!isIPO) toggleFavorite(row.id); 
                                                    }}
                                                >
                                                    <span className={isFav ? "text-yellow-400 drop-shadow-sm" : "text-slate-300 hover:text-yellow-300"}>
                                                        {isIPO ? '─' : (isFav ? '★' : '☆')}
                                                    </span>
                                                </td>
                                                <td className="px-4 py-3 sticky left-10 z-10 border-r border-slate-100 bg-inherit">
                                                    <div className="flex items-center justify-between">
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-blue-400 text-lg">{isExpanded ? '▼' : '▶'}</span>
                                                            <div>
                                                                <div className="font-bold text-slate-800 text-base">{isIPO ? (isSystemPrompt ? "💡 提示" : "🆕 新募集") : row.id}</div>
                                                                <div className="text-xs text-blue-700 font-bold max-w-[260px] truncate whitespace-normal leading-tight">{row.name}</div>
                                                            </div>
                                                        </div>
                                                        {row.freq && row.freq !== "" && row.freq !== "-" && !isIPO && (
                                                            <span className="ml-2 px-1.5 py-0.5 text-[10px] rounded bg-purple-100 text-purple-800 border border-purple-200 font-bold whitespace-nowrap">
                                                                {row.freq}
                                                            </span>
                                                        )}
                                                    </div>
                                                </td>
                                                {isIPO ? (
                                                    <React.Fragment>
                                                        <td className="px-4 py-3"><span className="px-2 py-1 bg-blue-50 text-blue-700 rounded text-xs font-bold">{fmtText(row.type)}</span></td>
                                                        <td className="px-4 py-3 font-medium text-slate-600">{fmtText(row.manager)}</td>
                                                        <td className="px-4 py-3 text-sm text-purple-700 font-semibold">{fmtText(row.period)}</td>
                                                        <td className="px-4 py-3 text-xs text-slate-400 font-medium animate-pulse">🔻 點選看申購連結</td>
                                                    </React.Fragment>
                                                ) : (
                                                    <React.Fragment>
                                                        <td className="px-4 py-3 font-semibold">{fmtVal(row.price)}</td>
                                                        <td className={`px-4 py-3 ${getReturnColor(row.ytd)}`}>{fmtPct(row.ytd)}</td>
                                                        <td className={`px-4 py-3 ${getReturnColor(row.cagr_1y)}`}>{fmtPct(row.cagr_1y)}</td>
                                                        <td className="px-4 py-3">{fmtVal(row.sharpe)}</td>
                                                        <td className="px-4 py-3 text-green-600 font-bold">{fmtPct(row.mdd)}</td>
                                                        <td className="px-4 py-3 font-mono text-slate-600">{fmtVal(row.vol_20d)}</td>
                                                    </React.Fragment>
                                                )}
                                            </tr>
                                            
                                            {isExpanded && (
                                                <tr className="bg-slate-50 border-b-2 border-blue-200">
                                                    <td colSpan={isIPO ? "5" : "8"} className="p-4 md:px-8">
                                                        {isIPO ? (
                                                            <div className="bg-white p-4 rounded-lg border shadow-sm max-w-4xl mx-auto">
                                                                <h4 className="font-bold mb-3 text-blue-800 border-b pb-2">📋 {row.name} - 申購與募集詳細資訊</h4>
                                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-2">
                                                                    <div className="md:col-span-2 bg-slate-50 p-3 rounded-lg border border-slate-200">
                                                                        <span className="font-bold text-sm block mb-1 text-slate-700">💡 申購操作指南：</span>
                                                                        <p className="text-xs text-slate-600 leading-relaxed whitespace-normal">
                                                                            {isSystemPrompt 
                                                                                ? "目前網路連線或目標爬蟲網站可能正在進行維護。您可以直接點擊右側按鈕，一鍵前往 Yahoo 股市基金募集專區，查看台灣當前最新一期的 ETF 與基金認購明細。" 
                                                                                : "本檔標的目前正處於「新基金募集 (IPO)」階段。您可以透過各大配合之銷售券商、商業銀行或直接向發行投信公司遞交申購書進行認購。募集期間結束並經核准成立後，才會正式進入台灣證券交易所掛牌上市交易。"}
                                                                        </p>
                                                                    </div>
                                                                    <div className="flex flex-col gap-2 justify-center">
                                                                        <a 
                                                                            href={isSystemPrompt ? "https://tw.stock.yahoo.com/class-funds" : `https://www.google.com/search?q=${encodeURIComponent(row.name)}+ETF+公開說明書+投信`} 
                                                                            target="_blank" 
                                                                            className="bg-blue-600 text-white hover:bg-blue-700 px-2 py-3 rounded-lg text-xs font-bold transition text-center shadow-sm flex items-center justify-center gap-1"
                                                                        >
                                                                            {isSystemPrompt ? "🌐 前往 Yahoo 基金募集專區" : "🔍 Google 搜尋公開說明書"}
                                                                        </a>
                                                                        <a 
                                                                            href={isSystemPrompt ? "https://tw.stock.yahoo.com/news" : `https://www.google.com/search?q=${encodeURIComponent(row.name)}+新聞+募集`} 
                                                                            target="_blank" 
                                                                            className="bg-slate-100 text-slate-700 hover:bg-blue-50 px-2 py-3 rounded-lg text-xs font-bold transition text-center shadow-sm border border-slate-200 hover:border-blue-300 flex items-center justify-center gap-1"
                                                                        >
                                                                            {isSystemPrompt ? "📰 前往 Yahoo 財經首頁" : "📰 閱讀募集關聯新聞"}
                                                                        </a>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <div className="bg-white p-4 rounded-lg border shadow-sm max-w-4xl mx-auto">
                                                                <h4 className="font-bold mb-3 text-slate-800 border-b pb-2">🔗 深度資訊與快捷連結</h4>
                                                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mt-3">
                                                                    <a href={`https://www.wantgoo.com/stock/etf/${row.id}/discount-premium`} target="_blank" className="bg-slate-100 text-slate-700 hover:bg-blue-50 px-2 py-3 rounded-lg text-sm font-bold transition text-center shadow-sm flex flex-col items-center justify-center gap-1 border border-slate-200 hover:border-blue-300">
                                                                        <span className="text-xl">⚖️</span>
                                                                        <span>折溢價與淨值</span>
                                                                    </a>
                                                                    <a href={`https://www.moneydj.com/ETF/X/Basic/Basic0005.xdjhtm?etfid=${row.id}.TW`} target="_blank" className="bg-slate-100 text-slate-700 hover:bg-blue-50 px-2 py-3 rounded-lg text-sm font-bold transition text-center shadow-sm flex flex-col items-center justify-center gap-1 border border-slate-200 hover:border-blue-300">
                                                                        <span className="text-xl">💰</span>
                                                                        <span>歷年配息與殖利率</span>
                                                                    </a>
                                                                    <a href={`https://www.wantgoo.com/stock/etf/${row.id}/profile`} target="_blank" className="bg-slate-100 text-slate-700 hover:bg-blue-50 px-2 py-3 rounded-lg text-sm font-bold transition text-center shadow-sm flex flex-col items-center justify-center gap-1 border border-slate-200 hover:border-blue-300">
                                                                        <span className="text-xl">📝</span>
                                                                        <span>規模與基本資料</span>
                                                                    </a>
                                                                    <a href={`https://www.wantgoo.com/stock/etf/${row.id}/constituent`} target="_blank" className="bg-slate-100 text-slate-700 hover:bg-blue-50 px-2 py-3 rounded-lg text-sm font-bold transition text-center shadow-sm flex flex-col items-center justify-center gap-1 border border-slate-200 hover:border-blue-300">
                                                                        <span className="text-xl">🏢</span>
                                                                        <span>成分股明細</span>
                                                                    </a>
                                                                    <a href={`https://tw.stock.yahoo.com/quote/${row.id}/news`} target="_blank" className="bg-blue-600 text-white hover:bg-blue-700 px-2 py-3 rounded-lg text-sm font-bold transition text-center shadow-sm col-span-2 md:col-span-4 flex items-center justify-center gap-2 mt-1">

        const root = ReactDOM.createRoot(document.getElementById('root'));
